<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Outer ripple ring */
    .ring {
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(220, 30, 30, 0.25);
      animation: ripple 1.2s ease-out infinite;
    }

    /* Second ring, offset */
    .ring2 {
      animation-delay: 0.4s;
    }

    /* Core red dot */
    .dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #e01e1e;
      box-shadow: 0 0 12px rgba(220, 30, 30, 0.9);
      animation: pulse 1.2s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    /* Mic icon text inside dot */
    .mic {
      position: absolute;
      font-size: 10px;
      color: white;
      z-index: 3;
      user-select: none;
    }

    @keyframes ripple {
      0% {
        transform: scale(0.6);
        opacity: 0.8;
      }

      100% {
        transform: scale(1.4);
        opacity: 0;
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
        box-shadow: 0 0 10px rgba(220, 30, 30, 0.8);
      }

      50% {
        transform: scale(1.15);
        box-shadow: 0 0 20px rgba(220, 30, 30, 1);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="ring"></div>
    <div class="ring ring2"></div>
    <div class="dot"></div>
    <span class="mic">🎙</span>
  </div>
</body>

</html>
